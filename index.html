<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>演讲比赛组卷工具 - Paper Builder</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --primary-dark: #4338ca;
      --success: #059669;
      --success-light: #ecfdf5;
      --warning: #d97706;
      --warning-light: #fffbeb;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .app-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .app-logo {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-logo svg { width: 24px; height: 24px; }

    .nav-tabs {
      display: flex;
      gap: 4px;
      height: 100%;
    }
    .nav-tab {
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      font-family: var(--font);
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 500;
    }

    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
    }
    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: var(--font);
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: #fff; color: var(--text); border-color: var(--border); }
    .btn-outline:hover { background: var(--bg); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #047857; }
    .btn-danger { background: #fff; color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger-light); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font);
      transition: border-color 0.15s;
      background: #fff;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table th, table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    table th {
      font-weight: 500;
      color: var(--text-muted);
      font-size: 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
    }
    table tbody tr:hover { background: var(--primary-light); }
    .table-wrap {
      max-height: 480px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-blue { background: var(--primary-light); color: var(--primary); }
    .badge-green { background: var(--success-light); color: var(--success); }
    .badge-amber { background: var(--warning-light); color: var(--warning); }
    .badge-red { background: var(--danger-light); color: var(--danger); }
    .badge-gray { background: #f3f4f6; color: var(--text-muted); }

    .difficulty-dots {
      display: inline-flex;
      gap: 2px;
    }
    .difficulty-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
    }
    .difficulty-dot.filled { background: var(--warning); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 13px; }

    .toast {
      position: fixed;
      top: 72px;
      right: 24px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      animation: slideIn 0.3s ease;
      box-shadow: var(--shadow-md);
    }
    .toast-success { background: var(--success); color: #fff; }
    .toast-error { background: var(--danger); color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s;
    }
    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 640px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h3 { font-size: 15px; margin-bottom: 16px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-chip {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      transition: all 0.15s;
      user-select: none;
    }
    .tag-chip.selected {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    .rule-section {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .rule-section h4 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .paper-preview {
      font-family: 'SimSun', 'STSong', serif;
      font-size: 14px;
      line-height: 2;
    }
    .paper-preview .section-title {
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      margin: 20px 0 12px;
      padding-top: 16px;
      border-top: 1px dashed var(--border);
    }
    .paper-preview .section-title:first-child { border-top: none; margin-top: 0; }
    .paper-preview .q-item {
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .paper-preview .q-item:hover { background: var(--bg); }
    .paper-preview .q-num { font-weight: 600; margin-right: 6px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-item {
      background: var(--bg);
      padding: 12px;
      border-radius: var(--radius-sm);
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 600; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-muted); }

    .progress-bar {
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .ab-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .ab-tab {
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      transition: all 0.15s;
    }
    .ab-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .search-bar input,
    .search-bar select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: var(--font);
    }

    .help-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .main-content { padding: 12px; }
      .form-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .nav-tabs { overflow-x: auto; }
    }

    .text-center { text-align: center; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .gap-8 { gap: 8px; }
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .flex-between { justify-content: space-between; }
    .flex-center { align-items: center; }

    /* ====== 登录覆盖层 ====== */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s, visibility 0.4s;
    }
    .login-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 380px;
      max-width: 92vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--primary);
    }
    .login-icon svg { width: 28px; height: 28px; }
    .login-card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a1a2e;
    }
    .login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .login-input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .login-input-group input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 2px;
    }
    .login-input-group input:focus {
      border-color: var(--primary);
    }
    .login-input-group input.error {
      border-color: var(--danger);
    }
    .login-toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .login-toggle-pw:hover { color: var(--text); }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
      transition: opacity 0.2s;
    }
</style>
</head>
<body>

<!-- ====== 登录覆盖层 ====== -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1"/>
      </svg>
    </div>
    <h2>权限验证</h2>
    <p>请输入密码方可进入组卷系统</p>
    <div class="login-input-group">
      <input type="password" id="loginPassword" placeholder="请输入密码" maxlength="32" autocomplete="off">
      <button class="login-toggle-pw" id="loginTogglePw" type="button" title="显示密码">
        <svg id="loginEyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <svg id="loginEyeOn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="login-btn" id="loginBtn">进入系统</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header class="app-header">
  <div class="app-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    演讲比赛组卷工具
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" data-page="bank">题库管理</button>
    <button class="nav-tab" data-page="rules">组卷规则</button>
    <button class="nav-tab" data-page="generate">生成试题</button>
  </nav>
</header>

<div class="main-content">

  <!-- ==================== 题库管理 ==================== -->
  <div id="page-bank" class="page active">
    <div class="stats-row" id="bank-stats"></div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">主题列表</div>
          <div class="card-subtitle">管理所有演讲主题，支持手动录入和Excel批量导入</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="downloadTemplate()">下载导入模板</button>
          <label class="btn btn-outline btn-sm" style="cursor:pointer">
            批量导入Excel
            <input type="file" accept=".xlsx,.xls" onchange="importExcel(this)" style="display:none">
          </label>
          <button class="btn btn-primary btn-sm" onclick="openAddQuestion()">+ 添加主题</button>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="bank-search" placeholder="搜索演讲主题..." oninput="renderBank()" style="flex:1;min-width:200px">
        <select id="bank-filter-type" onchange="renderBank()">
          <option value="all">全部题型</option>
          <option value="sentence">一句话演讲</option>
          <option value="keyword">关键词演讲</option>
        </select>
        <select id="bank-filter-diff" onchange="renderBank()">
          <option value="all">全部难度</option>
          <option value="1">难度 ★</option>
          <option value="2">难度 ★★</option>
          <option value="3">难度 ★★★</option>
          <option value="4">难度 ★★★★</option>
          <option value="5">难度 ★★★★★</option>
        </select>
        <select id="bank-filter-kp" onchange="renderBank()">
          <option value="all">全部标签</option>
        </select>
      </div>
      <div class="table-wrap" id="bank-table-wrap"></div>
    </div>
  </div>

  <!-- ==================== 组卷规则 ==================== -->
  <div id="page-rules" class="page">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">组卷规则配置</div>
          <div class="card-subtitle">定义试题结构，系统按规则自动从题库选题</div>
        </div>
        <div style="display:flex;gap:8px">
          <select id="rule-preset" onchange="loadRulePreset()" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">
            <option value="">-- 加载已保存规则 --</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="saveRule()">保存当前规则</button>
          <button class="btn btn-primary btn-sm" onclick="addRuleSection()">+ 添加题型</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>试卷名称</label>
          <input type="text" id="paper-name" value="演讲比赛试题" placeholder="如：2026年全国英语演讲大赛初赛">
        </div>
        <div class="form-group">
          <label>生成平行试卷</label>
          <select id="ab-papers">
            <option value="1">仅A卷</option>
            <option value="2">A卷 + B卷</option>
          </select>
        </div>
        <div class="form-group">
          <label>B卷难度偏移</label>
          <select id="ab-diff-offset">
            <option value="0">不偏移（同难度不同题）</option>
            <option value="1">B卷难度+1</option>
            <option value="-1">B卷难度-1</option>
          </select>
        </div>
      </div>

      <div id="rule-sections"></div>

      <div class="help-hint mt-12">
        提示：每个题型可设置数量、难度范围和知识点筛选。系统将尽量匹配，若题库不足会显示缺口。
      </div>
    </div>
  </div>

  <!-- ==================== 生成试卷 ==================== -->
  <div id="page-generate" class="page">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">试题生成</div>
          <div class="card-subtitle">按当前规则自动选题，预览并导出</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="generatePaper()">生成试题</button>
          <button class="btn btn-outline btn-sm" onclick="exportPaper()" id="btn-export" disabled>导出Word</button>
          <button class="btn btn-outline btn-sm" onclick="printPaper()" id="btn-print" disabled>打印试题</button>
        </div>
      </div>

      <div id="gen-stats" class="stats-row" style="display:none"></div>

      <div id="gen-ab-tabs" class="ab-tabs" style="display:none">

<script>
// ==================== 数据层 ====================
const KNOWLEDGE_POINTS = ['社会热点', '科技发展', '教育成长', '文化传承', '环境保护', '个人梦想', '青春励志', '国际视野'];
const QUESTION_TYPES = {
  sentence: '一句话演讲',
  keyword: '关键词演讲'
};

function loadData() {
  return {
    questions: JSON.parse(localStorage.getItem('pb_speech_questions') || '[]'),
    rules: JSON.parse(localStorage.getItem('pb_speech_rules') || '[]'),
    savedRules: JSON.parse(localStorage.getItem('pb_speech_saved_rules') || '[]')
  };
}
function saveQuestions(qs) { localStorage.setItem('pb_speech_questions', JSON.stringify(qs)); }
function saveSavedRules(rs) { localStorage.setItem('pb_speech_saved_rules', JSON.stringify(rs)); }

// ==================== Toast ====================
function toast(msg, type) {
  type = type || 'success';
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 2500);
}

// ==================== 导航 ====================
document.querySelectorAll('.nav-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.page).classList.add('active');
    if (tab.dataset.page === 'bank') renderBank();
    if (tab.dataset.page === 'rules') renderRules();
    if (tab.dataset.page === 'generate') updateGenStats();
  });
});

// ==================== 题库管理 ====================
function getQuestions() { return loadData().questions; }

function getDifficultyLabel(d) {
  var stars = ''; for (var i=0; i<d; i++) stars += '★';
  return stars;
}

function renderDifficultyDots(d) {
  var html = '<span class="difficulty-dots">';
  for (var i=0; i<5; i++) {
    html += '<span class="difficulty-dot' + (i<d?' filled':'') + '"></span>';
  }
  html += '</span>';
  return html;
}

function renderBankStats() {
  var qs = getQuestions();
  var stats = { total: qs.length };
  Object.keys(QUESTION_TYPES).forEach(function(t){ stats[t] = 0; });
  qs.forEach(function(q){ stats[q.type] = (stats[q.type]||0) + 1; });
  var html = '<div class="stat-item"><div class="stat-num">' + stats.total + '</div><div class="stat-label">题库总数</div></div>';
  Object.keys(QUESTION_TYPES).forEach(function(t){
    html += '<div class="stat-item"><div class="stat-num">' + (stats[t]||0) + '</div><div class="stat-label">' + QUESTION_TYPES[t] + '</div></div>';
  });
  document.getElementById('bank-stats').innerHTML = html;
}

function renderBank() {
  renderBankStats();
  var qs = getQuestions();
  var search = (document.getElementById('bank-search').value || '').toLowerCase();
  var typeFilter = document.getElementById('bank-filter-type').value;
  var diffFilter = document.getElementById('bank-filter-diff').value;
  var kpFilter = document.getElementById('bank-filter-kp').value;

  var filtered = qs;
  if (search) {
    filtered = filtered.filter(function(q){
      return (q.content||'').toLowerCase().indexOf(search) >= 0
        || (q.source||'').toLowerCase().indexOf(search) >= 0;
    });
  }
  if (typeFilter !== 'all') filtered = filtered.filter(function(q){ return q.type === typeFilter; });
  if (diffFilter !== 'all') filtered = filtered.filter(function(q){ return q.difficulty == diffFilter; });
  if (kpFilter !== 'all') filtered = filtered.filter(function(q){ return (q.knowledgePoints||[]).indexOf(kpFilter) >= 0; });

  // Update knowledge point filter options
  var allKPs = {};
  qs.forEach(function(q){ (q.knowledgePoints||[]).forEach(function(kp){ allKPs[kp] = true; }); });
  var kpSelect = document.getElementById('bank-filter-kp');
  var kpVal = kpSelect.value;
  kpSelect.innerHTML = '<option value="all">全部标签</option>';
  Object.keys(allKPs).sort().forEach(function(kp){
    kpSelect.innerHTML += '<option value="' + kp + '">' + kp + '</option>';
  });
  kpSelect.value = kpVal;

  if (filtered.length === 0) {
    document.getElementById('bank-table-wrap').innerHTML =
      '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
      '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '<p>' + (qs.length ? '没有匹配的主题' : '题库为空，点击"添加主题"或"批量导入Excel"开始') + '</p></div>';
    return;
  }

  var html = '<table><thead><tr><th>题型</th><th>难度</th><th>演讲主题</th><th style="width:140px">标签</th><th style="width:100px">来源</th><th style="width:80px">操作</th></tr></thead><tbody>';
  filtered.forEach(function(q, i){
    html += '<tr>';
    html += '<td><span class="badge badge-blue">' + QUESTION_TYPES[q.type] + '</span></td>';
    html += '<td>' + renderDifficultyDots(q.difficulty) + '</td>';
    html += '<td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (q.content||'').replace(/"/g,'&quot;') + '">' + (q.content||'') + '</td>';
    html += '<td><span class="badge badge-gray">' + (q.knowledgePoints||[]).join('</span> <span class="badge badge-gray">') + '</span></td>';
    html += '<td style="font-size:11px;color:var(--text-muted)">' + (q.source||'') + '</td>';
    html += '<td><button class="btn btn-outline btn-xs" onclick="editQuestion(' + i + ')" style="margin-right:3px">编辑</button>' +
            '<button class="btn btn-danger btn-xs" onclick="deleteQuestion(' + i + ')">删除</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('bank-table-wrap').innerHTML = html;
}

function openAddQuestion() {
  document.getElementById('modal-title').textContent = '添加演讲主题';
  document.getElementById('q-edit-id').value = '';
  document.getElementById('q-type').value = 'sentence';
  document.getElementById('q-difficulty').value = '3';
  document.getElementById('q-content').value = '';
  document.getElementById('q-source').value = '';
  renderTagCloud([]);
  document.getElementById('question-modal').style.display = 'flex';
}

function editQuestion(idx) {
  var q = getQuestions()[idx];
  document.getElementById('modal-title').textContent = '编辑演讲主题';
  document.getElementById('q-edit-id').value = q._id || '';
  document.getElementById('q-type').value = q.type;
  document.getElementById('q-difficulty').value = q.difficulty;
  document.getElementById('q-content').value = q.content || '';
  document.getElementById('q-source').value = q.source || '';
  renderTagCloud(q.knowledgePoints || []);
  document.getElementById('question-modal').style.display = 'flex';
}

function closeQuestionModal() {
  document.getElementById('question-modal').style.display = 'none';
}

function renderTagCloud(selected) {
  selected = selected || [];
  var html = '';
  KNOWLEDGE_POINTS.forEach(function(kp){
    var isSel = selected.indexOf(kp) >= 0;
    html += '<span class="tag-chip' + (isSel ? ' selected' : '') + '" onclick="toggleTag(this)" data-kp="' + kp + '">' + kp + '</span>';
  });
  document.getElementById('q-tags').innerHTML = html;
}

function toggleTag(el) {
  el.classList.toggle('selected');
}

function getSelectedTags() {
  var tags = [];
  document.querySelectorAll('#q-tags .tag-chip.selected').forEach(function(el){
    tags.push(el.dataset.kp);
  });
  return tags;
}

function saveQuestion() {
  var editId = document.getElementById('q-edit-id').value;
  var q = {
    _id: editId || ('q_' + Date.now() + '_' + Math.random().toString(36).slice(2,6)),
    type: document.getElementById('q-type').value,
    difficulty: parseInt(document.getElementById('q-difficulty').value),
    knowledgePoints: getSelectedTags(),
    content: document.getElementById('q-content').value.trim(),
    options: [],
    answer: '',
    source: document.getElementById('q-source').value.trim()
  };

  if (!q.content) {
    toast('请填写演讲主题', 'error'); return;
  }

  var all = getQuestions();
  if (editId) {
    var found = false;
    for (var i = 0; i < all.length; i++) {
      if (all[i]._id === editId) { all[i] = q; found = true; break; }
    }
    if (!found) { all.push(q); }
  } else {
    all.push(q);
  }
  saveQuestions(all);
  closeQuestionModal();
  renderBank();
  toast(editId ? '主题已更新' : '主题已添加');
}

function deleteQuestion(idx) {
  if (!confirm('确定删除这个演讲主题吗？此操作不可恢复。')) return;
  var all = getQuestions();
  all.splice(idx, 1);
  saveQuestions(all);
  renderBank();
  toast('主题已删除');
}

// ==================== Excel 导入导出 ====================
function downloadTemplate() {
  var wb = XLSX.utils.book_new();
  var template = [
    ['题型(sentence/keyword)', '难度(1-5)', '主题标签(逗号分隔)', '演讲主题内容', '来源/备注'],
    ['sentence', '3', '社会热点,科技发展', '人工智能如何改变我们的日常生活', '2025全国英语演讲大赛'],
    ['keyword', '2', '个人梦想,青春励志', '梦想,坚持,勇气,成长', '校园演讲比赛'],
    ['sentence', '4', '环境保护', 'As environmental challenges grow, what responsibility does each individual bear?', '国际演讲赛题'],
    ['keyword', '5', '国际视野,文化传承', 'globalization, cultural identity, tradition, innovation, balance', '高级组演讲'],
  ];
  var ws = XLSX.utils.aoa_to_sheet(template);
  ws['!cols'] = [{wch:18},{wch:10},{wch:18},{wch:50},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws, '演讲主题导入模板');
  XLSX.writeFile(wb, '演讲主题导入模板.xlsx');
}

function importExcel(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type: 'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header: 1});
      if (rows.length < 2) { toast('文件为空或格式不正确', 'error'); return; }
      var imported = [];
      for (var i = 1; i < rows.length; i++) {
        var r = rows[i];
        if (!r[0] || !r[3]) continue;
        imported.push({
          _id: 'imp_' + Date.now() + '_' + i,
          type: String(r[0]).trim().toLowerCase(),
          difficulty: parseInt(r[1]) || 3,
          knowledgePoints: String(r[2]||'').split(/[,，]/).map(function(s){ return s.trim(); }).filter(Boolean),
          content: String(r[3]).trim(),
          options: [],
          answer: '',
          source: String(r[4]||'').trim()
        });
      }
      var all = getQuestions().concat(imported);
      saveQuestions(all);
      renderBank();
      toast('成功导入 ' + imported.length + ' 个演讲主题');
    } catch(err) {
      toast('导入失败，请检查文件格式', 'error');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

// ==================== 组卷规则 ====================
var paperRules = [];

function getSavedRules() { return loadData().savedRules; }
function getCurrentRule() {
  var sections = [];
  document.querySelectorAll('#rule-sections .rule-section').forEach(function(sec){
    var selType = sec.querySelector('.rs-type');
    var selCount = sec.querySelector('.rs-count');
    var selDiffMin = sec.querySelector('.rs-diff-min');
    var selDiffMax = sec.querySelector('.rs-diff-max');
    var tags = [];
    sec.querySelectorAll('.tag-chip.selected').forEach(function(t){ tags.push(t.dataset.kp); });
    sections.push({
      type: selType ? selType.value : 'single',
      count: selCount ? parseInt(selCount.value) : 10,
      diffMin: selDiffMin ? parseInt(selDiffMin.value) : 1,
      diffMax: selDiffMax ? parseInt(selDiffMax.value) : 5,
      knowledgePoints: tags
    });
  });
  return sections;
}

function renderRuleSection(s) {
  s = s || { type: 'sentence', count: 8, diffMin: 1, diffMax: 5, knowledgePoints: [] };
  var html = '<div class="rule-section">';
  html += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">';
  html += '<select class="rs-type" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">';
  Object.keys(QUESTION_TYPES).forEach(function(t){
    html += '<option value="' + t + '"' + (s.type===t?' selected':'') + '>' + QUESTION_TYPES[t] + '</option>';
  });
  html += '</select>';
  html += '<label style="font-size:12px;color:var(--text-muted)">数量</label>';
  html += '<input class="rs-count" type="number" min="1" max="100" value="' + s.count + '" style="width:60px;padding:6px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">';
  html += '<label style="font-size:12px;color:var(--text-muted);margin-left:8px">难度范围</label>';
  html += '<select class="rs-diff-min" style="padding:6px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">';
  for (var d=1; d<=5; d++) html += '<option value="' + d + '"' + (s.diffMin===d?' selected':'') + '>' + d + '</option>';
  html += '</select><span style="font-size:12px;color:var(--text-muted)">至</span>';
  html += '<select class="rs-diff-max" style="padding:6px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">';
  for (var d=1; d<=5; d++) html += '<option value="' + d + '"' + (s.diffMax===d?' selected':'') + '>' + d + '</option>';
  html += '</select>';
  html += '<button class="btn btn-danger btn-xs" onclick="this.closest(\'.rule-section\').remove()" style="margin-left:auto">删除</button>';
  html += '</div>';
  html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">标签筛选（留空=不限制）：</div>';
  html += '<div class="tag-cloud">';
  KNOWLEDGE_POINTS.forEach(function(kp){
    var isSel = (s.knowledgePoints||[]).indexOf(kp) >= 0;
    html += '<span class="tag-chip' + (isSel?' selected':'') + '" onclick="this.classList.toggle(\'selected\')" data-kp="' + kp + '">' + kp + '</span>';
  });
  html += '</div>';
  html += '</div>';
  return html;
}

function addRuleSection(s) {
  var div = document.createElement('div');
  div.innerHTML = renderRuleSection(s);
  document.getElementById('rule-sections').appendChild(div.firstElementChild);
}

function renderRules() {
  if (paperRules.length === 0) {
    paperRules = [
      { type: 'sentence', count: 8, diffMin: 1, diffMax: 5, knowledgePoints: [] },
      { type: 'keyword', count: 4, diffMin: 2, diffMax: 5, knowledgePoints: [] },
    ];
  }

  document.getElementById('rule-sections').innerHTML = '';
  paperRules.forEach(function(r){ addRuleSection(r); });

  // Update rule presets
  var presets = getSavedRules();
  var sel = document.getElementById('rule-preset');
  var val = sel.value;
  sel.innerHTML = '<option value="">-- 加载已保存规则 --</option>';
  presets.forEach(function(p, i){
    sel.innerHTML += '<option value="' + i + '">' + p.name + '</option>';
  });
  sel.value = val;
}

function saveRule() {
  // Save current form state to paperRules
  paperRules = getCurrentRule();
  document.getElementById('rule-save-modal').style.display = 'flex';
}

function closeRuleSaveModal() {
  document.getElementById('rule-save-modal').style.display = 'none';
}

function confirmSaveRule() {
  var name = document.getElementById('rule-save-name').value.trim();
  if (!name) { toast('请输入规则名称', 'error'); return; }
  paperRules = getCurrentRule();
  var presets = getSavedRules();
  presets.push({ name: name, rules: JSON.parse(JSON.stringify(paperRules)) });
  saveSavedRules(presets);
  closeRuleSaveModal();
  document.getElementById('rule-save-name').value = '';
  renderRules();
  toast('规则已保存：' + name);
}

function loadRulePreset() {
  var idx = parseInt(document.getElementById('rule-preset').value);
  if (isNaN(idx)) return;
  var preset = getSavedRules()[idx];
  if (!preset) return;
  paperRules = JSON.parse(JSON.stringify(preset.rules));
  document.getElementById('rule-sections').innerHTML = '';
  paperRules.forEach(function(r){ addRuleSection(r); });
  toast('已加载规则：' + preset.name);
}

// ==================== 组卷引擎 ====================
var generatedPapers = { A: [], B: [] };

function generatePaper() {
  paperRules = getCurrentRule();
  if (paperRules.length === 0) {
    toast('请先在"组卷规则"中配置题型', 'error'); return;
  }

  var qs = getQuestions();
  if (qs.length === 0) {
    toast('题库为空，请先添加演讲主题', 'error'); return;
  }

  var abCount = parseInt(document.getElementById('ab-papers').value);
  var diffOffset = parseInt(document.getElementById('ab-diff-offset').value) || 0;

  var paperA = assemblePaper(qs, paperRules, 0);
  var paperB = abCount > 1 ? assemblePaper(qs, paperRules, diffOffset, paperA) : [];

  generatedPapers = { A: paperA, B: paperB };

  // Switch to generate page
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelector('[data-page="generate"]').classList.add('active');
  document.getElementById('page-generate').classList.add('active');

  renderGenerated();
  toast(paperA.gaps.length === 0 ? '选题完成' : '选题完成，但有主题缺口');
}

function assemblePaper(allQuestions, rules, diffOffset, excludePaper) {
  var usedIds = {};
  if (excludePaper) {
    excludePaper.sections.forEach(function(s){
      s.questions.forEach(function(q){ usedIds[q._id] = true; });
    });
  }

  var sections = [];
  var allGaps = [];

  rules.forEach(function(rule) {
    var diffMin = Math.max(1, Math.min(5, rule.diffMin + diffOffset));
    var diffMax = Math.max(1, Math.min(5, rule.diffMax + diffOffset));

    var pool = allQuestions.filter(function(q) {
      if (usedIds[q._id]) return false;
      if (q.type !== rule.type) return false;
      if (q.difficulty < diffMin || q.difficulty > diffMax) return false;
      if (rule.knowledgePoints && rule.knowledgePoints.length > 0) {
        var qKPs = q.knowledgePoints || [];
        var hasMatch = rule.knowledgePoints.some(function(kp){ return qKPs.indexOf(kp) >= 0; });
        if (!hasMatch) return false;
      }
      return true;
    });

    pool.sort(function(a, b){ return a.difficulty - b.difficulty; });

    var selected = [];
    if (rule.count <= pool.length && rule.count > 1) {
      var byDiff = {};
      pool.forEach(function(q){
        var d = q.difficulty;
        if (!byDiff[d]) byDiff[d] = [];
        byDiff[d].push(q);
      });

      var perDiff = Math.max(1, Math.floor(rule.count / Object.keys(byDiff).length));
      var remaining = rule.count;
      var diffLevels = Object.keys(byDiff).sort(function(a,b){ return a-b; });

      diffLevels.forEach(function(level){
        var take = Math.min(perDiff, remaining, byDiff[level].length);
        for (var i = 0; i < take; i++) {
          var q = byDiff[level][i];
          selected.push(q);
          usedIds[q._id] = true;
          remaining--;
        }
      });

      var extraPool = pool.filter(function(q){ return selected.indexOf(q) < 0; });
      for (var i = 0; i < remaining && i < extraPool.length; i++) {
        selected.push(extraPool[i]);
        usedIds[extraPool[i]._id] = true;
      }
    } else {
      for (var i = 0; i < Math.min(rule.count, pool.length); i++) {
        selected.push(pool[i]);
        usedIds[pool[i]._id] = true;
      }
    }

    var gap = rule.count - selected.length;
    if (gap > 0) {
      allGaps.push({ type: rule.type, need: gap, label: QUESTION_TYPES[rule.type] });
    }

    sections.push({
      type: rule.type,
      label: QUESTION_TYPES[rule.type],
      questions: selected,
      requested: rule.count,
      gap: gap
    });
  });

  return { sections: sections, gaps: allGaps };
}

function renderGenerated() {
  updateGenStats();

  var abCount = parseInt(document.getElementById('ab-papers').value);
  var paper = generatedPapers.A;

  // A/B tabs
  var tabsDiv = document.getElementById('gen-ab-tabs');
  if (abCount > 1 && generatedPapers.B && generatedPapers.B.sections) {
    tabsDiv.style.display = 'flex';
    tabsDiv.querySelectorAll('.ab-tab').forEach(function(t){
      t.classList.remove('active');
      if (t.dataset.ab === 'A') t.classList.add('active');
    });
  } else {
    tabsDiv.style.display = 'none';
  }

  document.getElementById('btn-export').disabled = false;
  document.getElementById('btn-print').disabled = false;

  renderPaperPreview('A');

function updateGenStats() {
  var paper = generatedPapers.A;
  if (!paper || !paper.sections) {
    document.getElementById('gen-stats').style.display = 'none';
    return;
  }
  document.getElementById('gen-stats').style.display = 'grid';
  var totalQ = 0, totalGap = 0;
  paper.sections.forEach(function(s){ totalQ += s.questions.length; totalGap += s.gap; });

  var html = '<div class="stat-item"><div class="stat-num" style="color:var(--success)">' + totalQ + '</div><div class="stat-label">已选主题数</div></div>';
  html += '<div class="stat-item"><div class="stat-num" style="color:'+(totalGap>0?'var(--danger)':'var(--success)')+'">' + (totalGap>0?'-'+totalGap:'0') + '</div><div class="stat-label">主题缺口</div></div>';
  html += '<div class="stat-item"><div class="stat-num">' + paper.sections.length + '</div><div class="stat-label">题型数量</div></div>';
  html += '<div class="stat-item"><div class="stat-num">' + paper.gaps.length + '</div><div class="stat-label">缺口题型</div></div>';
  document.getElementById('gen-stats').innerHTML = html;
}

function renderPaperPreview(ab) {
  var paper = ab === 'A' ? generatedPapers.A : generatedPapers.B;
  if (!paper || !paper.sections) return;

  var qNum = 1;
  var html = '<div class="paper-preview">';

  paper.sections.forEach(function(sec, si){
    html += '<div class="section-title">' + sec.label + ' (' + sec.questions.length + '/' + sec.requested + '个)</div>';

    if (sec.gap > 0) {
      html += '<div style="padding:8px;background:var(--warning-light);border-radius:4px;margin:8px 0;font-size:12px;color:var(--warning)">';
      html += '主题不足：需 ' + sec.requested + ' 个，仅有 ' + sec.questions.length + ' 个，缺口 ' + sec.gap + ' 个。请补充题库。';
      html += '</div>';
    }

    sec.questions.forEach(function(q, qi){
      html += '<div class="q-item">';
      html += '<span class="q-num">' + qNum + '.</span> ' + (q.content||'').replace(/\n/g, '<br>');
      if (q.options && q.options.length > 0) {
        html += '<div style="margin-left:20px;margin-top:4px">';
        q.options.forEach(function(opt, oi){
          html += '<div>' + opt + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
      qNum++;
    });
  });

  html += '</div>';

  // Show gaps summary
  if (paper.gaps.length > 0) {
    html += '<div class="card" style="margin-top:16px;background:var(--warning-light);border-color:var(--warning)">';
    html += '<div style="font-weight:600;color:var(--warning);font-size:13px;margin-bottom:4px">主题缺口汇总</div>';
    paper.gaps.forEach(function(g){
      html += '<div style="font-size:12px;color:var(--warning)">' + g.label + '：缺 ' + g.need + ' 个</div>';
    });
    html += '</div>';
  }

  document.getElementById('paper-content').innerHTML = html;
}

// A/B tab switching
document.getElementById('gen-ab-tabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('ab-tab')) return;
  document.querySelectorAll('#gen-ab-tabs .ab-tab').forEach(function(t){ t.classList.remove('active'); });
  e.target.classList.add('active');
  renderPaperPreview(e.target.dataset.ab);
});

function exportPaper() {
  var abCount = parseInt(document.getElementById('ab-papers').value);

  var allContent = '';
  [generatedPapers.A, generatedPapers.B].forEach(function(paper, pi) {
    if (!paper || !paper.sections) return;
    if (pi > 0 && abCount < 2) return;

    var label = pi === 0 ? 'A卷' : 'B卷';
    allContent += '<h1 style="text-align:center;margin-bottom:4px">' + (document.getElementById('paper-name').value||'演讲比赛试题') + '</h1>';
    allContent += '<h2 style="text-align:center;color:#666;margin-bottom:20px">' + label + '</h2>';

    var qNum = 1;
    paper.sections.forEach(function(sec){
      allContent += '<h3 style="border-bottom:1px solid #ccc;padding-bottom:4px;margin-top:20px">' + sec.label + ' (' + sec.questions.length + '个主题)</h3>';

      sec.questions.forEach(function(q){
        allContent += '<p style="margin:8px 0"><strong>' + qNum + '.</strong> ' + (q.content||'').replace(/\n/g, '<br>') + '</p>';
        if (q.options && q.options.length > 0) {
          allContent += '<ol style="list-style-type:upper-alpha;margin-left:28px">';
          q.options.forEach(function(opt){ allContent += '<li>' + opt + '</li>'; });
          allContent += '</ol>';
        }
        qNum++;
      });
    });
    if (abCount > 1 && pi === 0) allContent += '<div style="page-break-after:always"></div>';
  });

  var blob = new Blob(['<html><head><meta charset="UTF-8"><style>body{font-family:SimSun,STSong,serif;font-size:14px;line-height:2;padding:40px}h1{font-size:22px}h2{font-size:16px}h3{font-size:15px}p{margin:6px 0}ol{margin:4px 0}</style></head><body>' + allContent + '</body></html>'], {type: 'application/msword'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (document.getElementById('paper-name').value||'演讲比赛试题') + '.doc';
  a.click();
  URL.revokeObjectURL(url);
  toast('试题已导出为Word文档');
}

function printPaper() {
  var paperHtml = document.getElementById('paper-content').innerHTML;
  var title = document.getElementById('paper-name').value || '演讲比赛试题';
  var win = window.open('', '_blank', 'width=800,height=600');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + title + '</title>');
  win.document.write('<style>body{font-family:SimSun,STSong,serif;font-size:14px;line-height:2;padding:40px;max-width:800px;margin:0 auto}.section-title{font-size:16px;font-weight:bold;text-align:center;margin:20px 0 12px;padding-top:16px;border-top:1px dashed #ccc}.q-item{margin-bottom:12px}.q-num{font-weight:bold}</style>');
  win.document.write('</head><body><h1 style="text-align:center">' + title + '</h1>');
  win.document.write(paperHtml.replace(/section-title/g,'section-title-print').replace(/q-item/g,'q-item-print').replace(/q-num/g,'q-num-print'));
  win.document.write('</body></html>');
  win.document.close();
  setTimeout(function(){ win.print(); }, 500);
}

// ==================== 登录 ====================
(function() {
  var CORRECT_PW = '220787Yyw';
  var overlay = document.getElementById('loginOverlay');
  var input = document.getElementById('loginPassword');
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  var toggleBtn = document.getElementById('loginTogglePw');
  var eyeOff = document.getElementById('loginEyeOff');
  var eyeOn = document.getElementById('loginEyeOn');

  function unlock() {
    overlay.classList.add('hidden');
    sessionStorage.setItem('_pb_auth', '1');
  }

  // 已登录过则跳过
  if (sessionStorage.getItem('_pb_auth') === '1') {
    overlay.classList.add('hidden');
  }

  function tryLogin() {
    if (input.value === CORRECT_PW) {
      err.textContent = '';
      input.classList.remove('error');
      unlock();
    } else {
      err.textContent = '密码错误，请重试';
      input.classList.add('error');
      input.value = '';
      input.focus();
    }
  }

  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
  });

  // 显示/隐藏密码
  toggleBtn.addEventListener('click', function() {
    if (input.type === 'password') {
      input.type = 'text';
      eyeOff.style.display = 'none';
      eyeOn.style.display = 'block';
    } else {
      input.type = 'password';
      eyeOff.style.display = 'block';
      eyeOn.style.display = 'none';
    }
  });

  // 自动聚焦
  input.focus();
})();
